<title><span style="color:#ffffff;">DARK</span> <span style="color:#d40000;">ZERO</span> <span style="color:#ffffff;">RADIO</span> – TODAY</title>


<style>
:root{
--dzr-red:#d40000;
--dzr-dark:#2a0000;
--dzr-bg:#070000;
--dzr-glow:rgba(212,0,0,.45);
}

body{
background:#000;
color:var(--dzr-red);
font-family:Arial,sans-serif;
margin:0;
padding:6px;
}

h1{
text-align:center;
font-size:28px;
color:#fff;
margin:15px 0;
letter-spacing:2px;
text-shadow:0 0 8px var(--dzr-red),0 0 18px var(--dzr-glow);
}

.subtitle{
display:block;
font-size:18px;
margin-top:5px;
color:#ffb3b3;
}

.home-btn{
position:absolute;
top:8px;
right:8px;
padding:4px 9px;
border:1px solid var(--dzr-red);
border-radius:5px;
background:linear-gradient(180deg,#120000,#050000);
color:#fff;
text-decoration:none;
font-size:12px;
box-shadow:0 0 10px var(--dzr-glow);
}

.day-block{
max-width:860px;
margin:auto;
background:linear-gradient(180deg,#120000,#050000);
border:1px solid var(--dzr-red);
border-radius:12px;
overflow:hidden;
box-shadow:0 0 18px var(--dzr-glow);
}

.day-title{
background:linear-gradient(90deg,#330000,#5a0000,#330000);
padding:12px;
color:#fff;
font-weight:bold;
text-align:center;
text-shadow:0 0 10px var(--dzr-red);
}

table{width:100%;border-collapse:collapse;}
th{
background:#140000;
color:#fff;
padding:10px;
border-bottom:1px solid #4a0000;
}
td{
padding:10px;
border-bottom:1px solid #220000;
}
tr:nth-child(even){background:#0d0000;}
tr:hover{background:#170000;}

.show-img{
width:162px;
height:72px;
object-fit:cover;
border-radius:8px;
border:1px solid var(--dzr-red);
box-shadow:0 0 8px var(--dzr-glow);
}

.show-name{
font-weight:bold;
font-size:18px;
color:#fff;
}

.current-show{
background:#1a0000!important;
box-shadow:inset 0 0 20px rgba(212,0,0,.25);
}

.on-air{
color:#ff3030;
font-weight:bold;
text-shadow:0 0 8px rgba(255,0,0,.6);
}

footer{
text-align:center;
margin-top:20px;
color:#999;
}

function getCurrentDay(){

const d=
new Date().getDay();

const map=[
"sun",
"mon",
"tue",
"wed",
"thu",
"fri",
"sat"
];

return map[d];

}

function getImage(name){

for(let key in djCovers){

if(
name.includes(key)
)

return imageBase+
djCovers[key];

}

return imageBase+
defaultImg;

}

async function loadSchedule(){

const res=
await fetch(
"https://api.laut.fm/station/darkzeroradio/schedule"
);

const data=
await res.json();

const today=
getCurrentDay();

const shows=
data
.filter(
x=>x.day===today
)
.sort(
(a,b)=>
a.hour-b.hour
);

let html=`

<div class="day-block">

<div class="day-title">

${today.toUpperCase()}

</div>

<table>

<tr>

<th>START</th>

<th>BILD</th>

<th>END</th>

<th>SENDUNG</th>

</tr>

`;

const now=
new Date()
.getHours();

shows.forEach(show=>{

const live=

(show.hour<=now
&&
show.end_time>now)

?

`<span class="on-air">
ON AIR
</span>`

:

"";

const active=
live
?
"current-show"
:
"";

html+=`

<tr class="${active}">

<td>
${show.hour}:00
</td>

<td>

<img
class="show-img"
src="${getImage(show.name)}">

</td>

<td>
${show.end_time}:00
</td>

<td class="show-name">

${show.name}

${live}

</td>

</tr>

`;

});

html+=`
</table>
</div>
`;

document
.getElementById(
"schedule"
)
.innerHTML=
html;

}

loadSchedule();

setInterval(
loadSchedule,
60000
);

</script>
